<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mabini Classroom</title>
    <!-- Preconnect to API + Supabase so DNS/TLS finishes before JS fires -->
    <link rel="preconnect" href="https://mabinilms.onrender.com" crossorigin />
    <link rel="preconnect" href="https://bwzqqifuwqpzfvauwgqq.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://mabinilms.onrender.com" />
    <link rel="dns-prefetch" href="https://bwzqqifuwqpzfvauwgqq.supabase.co" />
    <!-- Preload login background as LCP hint -->
    <link
      rel="preload"
      as="image"
      href="/backgroundlms-1280.webp"
      type="image/webp"
      imagesrcset="/backgroundlms-768.webp 768w, /backgroundlms-1280.webp 1280w, /backgroundlms-1920.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <meta name="description" content="Learning Management System for Mabini National High School" />
    <meta name="author" content="Mabini National High School" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mabini Classroom" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Mabini Classroom" />
    <meta property="og:description" content="Learning Management System for Mabini National High School" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mabini Classroom" />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
