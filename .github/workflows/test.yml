name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/test.yml'

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=server

      - name: Build
        run: npm run build --workspace=server

      - name: Run tests
        run: npm test --workspace=server

      - name: Generate coverage report
        run: npm run test:coverage --workspace=server
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./server/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm exec --workspace=server tsc -- --noEmit -p tsconfig.json

  test-report:
    runs-on: ubuntu-latest
    if: always()
    needs: [test, type-check]

    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.type-check.result }}" == "failure" ]; then
            echo "❌ Tests or type checking failed"
            exit 1
          else
            echo "✅ All checks passed"
          fi
