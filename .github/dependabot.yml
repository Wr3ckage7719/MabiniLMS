version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: '03:30'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      client-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
